#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "Alex Dickson"
email = "alex.dickson@immfly.com"

[ui]
default-command = "show"
editor = "vim"
# Make jj emit git-style diffs, which delta understands best.
diff-formatter = ":git"
pager = "jj-delta"

[aliases]
".." = ["edit", "@-"]
",," = ["edit", "@+"]

b = ["branch"]
n = ["new"]
fetch = ["git", "fetch"]
f = ["git", "fetch"]
push = ["git", "push"]
p = ["git", "push"]
clone = ["git", "clone"]
cl = ["git", "clone"]
d = ["describe", "-m"]
l = ["log", "-T", "description"]
s = ["squash"]
a = ["abandon"]

# Move the closest bookmark to the current commit. This is useful when
# working on a named branch, creating a bunch of commits, and then needing
# to update the bookmark before pushing.
tug = ["bookmark", "move", "--from", "closest_bookmark(@-)", "--to", "@-"]

# Rebase the current branch onto the trunk.
retrunk = ["rebase", "-d", "trunk()"]

[revset-aliases]
"closest_bookmark(to)" = "heads(::to & bookmarks())"
"fork_history(to, from)" = "fork_point(to | from)..@"

[template-aliases]
"format_timestamp(timestamp)" = "timestamp.ago()"
