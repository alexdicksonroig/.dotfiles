set -g default-shell /opt/homebrew/bin/bash
set-option -g default-terminal "tmux-256color"
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -s escape-time 0
set -g mouse on

bind -n C-s last-pane
bind -n C-h select-window -t 1
bind -n C-j select-window -t 2
bind -n C-k select-window -t 3
bind -n C-t next-window

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind \"
bind _ split-window -v

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z


bind r source-file ~/.tmux.conf
set -g base-index 1

bind -r a last-window

setw -g mode-keys vi
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# forget the find window.  That is for chumps
bind-key -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key -r i run-shell "tmux neww tmux-cht.sh"

# Theme follows the system appearance. macOS returns nothing for light mode.
set -g focus-events on
set -g status-interval 5
set -g status-left-length 32
set -g status-left "#(~/.local/bin/tmux-appearance status)[#S] "
set -g @theme_apply '~/.local/bin/tmux-appearance apply'

run-shell -b '#{@theme_apply}'
set-hook -g client-attached 'run-shell -b "#{@theme_apply}"'
set-hook -g client-focus-in 'run-shell -b "#{@theme_apply}"'
set-hook -g client-session-changed 'run-shell -b "#{@theme_apply}"'

set-option -g status-position bottom
