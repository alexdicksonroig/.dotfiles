set -g default-shell /opt/homebrew/bin/bash
set-option -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -s escape-time 0
set -g mouse on

bind -n C-s last-pane
bind -n C-j select-window -t 1
bind -n C-k select-window -t 2
bind -n C-e select-window -t 3

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind \"
bind _ split-window -v

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z


bind r source-file ~/.tmux.conf
set -g base-index 1

bind -r a last-window

setw -g mode-keys vi
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# forget the find window.  That is for chumps
bind-key -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key -r i run-shell "tmux neww tmux-cht.sh"

# Theme follows the system appearance. macOS returns nothing for light mode.
set -g focus-events on
set -g @theme_apply 'if [ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = Dark ]; then tmux set -g @system_appearance dark \; set -g pane-active-border-style "fg=cyan" \; set -g status-style "bg=default,fg=default" \; set-option -g message-style "fg=default,bg=default" \; setw -g window-status-current-format " #I#[fg=colour255]:#[fg=colour255]#W#[fg=colour203]#F " \; setw -g window-status-format " #I#[fg=colour255]:#[fg=colour250]#W#[fg=colour244]#F "; else tmux set -g @system_appearance light \; set -g pane-active-border-style "fg=#2f6f9f" \; set -g status-style "bg=#ffffff,fg=#403a35" \; set-option -g message-style "fg=#1f2933,bg=#ffffff" \; setw -g window-status-current-format " #I#[fg=#111111]:#[fg=#111111]#W#[fg=#d14d72]#F " \; setw -g window-status-format " #I#[fg=#58524b]:#[fg=#403a35]#W#[fg=#a09a93]#F "; fi'

run-shell -b '#{@theme_apply}'
set-hook -g client-focus-in 'run-shell -b "#{@theme_apply}"'
set-hook -g client-session-changed 'run-shell -b "#{@theme_apply}"'

set-option -g status-position bottom
